name: Go generate ModuleDescriptor

on:
  workflow_call:
    inputs:
      artifact-id:
        required: true
        type: string
      artifact-version:
        required: true
        type: string
      docker-registry:
        required: true
        type: string

jobs:
  run:
    name: Generate ModuleDescriptor
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ${{ github.repository }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Generate ModuleDescriptor
        env:
          VERSION: ${{ inputs.artifact-version }}
        run: |
          cd target
          make

      - name: Update LaunchDescriptor
        env:
          IMAGE: ${{ inputs.docker-registry }}/${{ inputs.artifact-id }}:${{ inputs.artifact-version }}
        run: |
          cd target
          mv ModuleDescriptor.json ModuleDescriptor.json.orig
          jq --arg image "$IMAGE" '.launchDescriptor.dockerImage |= $image | .launchDescriptor.dockerPull |= "true"' \
            ModuleDescriptor.json.orig > ModuleDescriptor.json

      - name: Print ModuleDescriptor
        run: cat target/ModuleDescriptor.json

      # we publish it to the registry as a separate job
      - name: Upload ModuleDescriptor as build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ModuleDescriptor.json
          path: target/ModuleDescriptor.json
          retention-days: 1

