name: Go lint

on:
  workflow_call:
    inputs:
      lint-errcheck-excludes-file:
        required: false
        type: string
      lint-golangci-config-file:
        required: false
        type: string
      allow-lint-errors:
        required: true
        type: boolean

jobs:
  golangci:
    name: Lint with golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ${{ github.repository }}
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Checkout folio-org/folio-tools
        uses: actions/checkout@v4
        with:
          repository: folio-org/folio-tools
          ref: FOLIO-3994-go-lint-args
          path: folio-tools
          fetch-depth: 1

      - name: Determine golangci-lint arguments
        run: echo golangci_args=$(./folio-tools/github-actions-scripts/go-golangci-lint-args.sh) | tee -a $GITHUB_ENV
        env:
          CONFIG_FILE: ${{ inputs.lint-golangci-config-file }}
          ALLOW_LINT_ERRORS: ${{ inputs.allow-lint-errors }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        # defaults: gosimple govet ineffassign unused
        with:
          version: v1.61
          args: ${{ env.golangci_args }}

  other-lint:
    name: Lint with others
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ${{ github.repository }}
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Install errcheck
        run: go install github.com/kisielk/errcheck@latest

      - name: Run errcheck
        run: |
          if ${{ inputs.lint-errcheck-excludes-file != '' }}; then
            option_errcheck_exclude="-exclude ${{ inputs.lint-errcheck-excludes-file }}"
          else
            option_errcheck_exclude=""
          fi
          errcheck $option_errcheck_exclude ./...

      - name: Run staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "2024.1.1"
          install-go: false
